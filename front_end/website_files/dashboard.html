            </ul>
        </nav>
    </header>

    <div class="content">
        <h1 id="greeting"> Hello <span id="user_tag">User#</span>! </h1>
        <script>
            function getCookie(name) {
                const cookies = document.cookie.split(";");
                for (let i = 0; i < cookies.length; i++) {
                    let cookie = cookies[i];
                    if (cookie.startsWith(name+"=") == true) {
                        return decodeURIComponent(cookie.substring(name.length + 1));
                    }
                }
                return "Temp";
            }

            user_identity = getCookie('user_identity');
            document.getElementById("user_tag").textContent += user_identity;
        </script>
        <ul class="user_actions">
