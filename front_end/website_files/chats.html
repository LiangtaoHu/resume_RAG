<!--
Typical header and footer
Body is split vertically with 3/4ths of the space being dedicated to choosing or starting a conversation and the remaining 1/4ths being a chat window.
    - Bigger portion has two upper tabs: Choose 2 OR Existing Conversations
    - Choose 2 displays first one section then another section below it: Resumes and Job Listings respectively
        - Resumes and Job Listings are represented by Icons titled at the bottom of the icon their ID
        - You choose two, they a greyed out button at the bottom of this portion lights up to blue named "Generate"
    - Existing Conversations lists the existing conversations with icons and again with their IDs being displayed at the bottom of the icons.
        - Selecting one, the greyed out button at the bottom lights up named "Continue"
    - When not selecting anything, the chat window is completely empty with only the user chatbox at the bottom with a send icon for messages.
        - Trying to message is impossible, greyed out SEND button
    - When you finished generating or continuing a conversation (by button press), the chat window loads up the chat history first THEN it allows user submissions
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="./style/base.css">
    <link rel="stylesheet" href="./style/chats.css">
    <script src="./javascript/chats.js" defer></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Optimizer - Your Conversations</title>
</head>
<body>
    <header>
        <div class="logo">

    <div class="content">

                <div class="icon">test</div>
                <div class="icon">test</div>
                <div class="icon">test</div>
                <div class="icon">test</div>
            </div>
    
            <div id="creation_menu" class="creation_layout hidden">
                <button type="button" id="back_button" class="back_button">&lt;&lt;</button>
                <div id="resume_grid" class="creation_grid">
                    <div class="icon">test</div>
                    <div class="icon">test</div>
                    <div class="icon">test</div>
                    <div class="icon">test</div>
                    <div class="icon">test</div>
                    <div class="icon">test</div>
                    <div class="icon">test</div>

                    <div class="icon">test</div>
                    <div class="icon">test</div>
                    <div class="icon">test</div>
                    <div class="icon">test</div>

    </div>

    <footer>
        <h3><a href="https://github.com/LiangtaoHu/resume_RAG" target="_blank"> Git Repository </a> </h3> 
    </footer>
</body>
</html>
